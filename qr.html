<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FridAI — Scanner l'app</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: #F9FAFB;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 380px;
      width: 100%;
    }
    h1 { color: #16A34A; font-size: 28px; margin-bottom: 6px; }
    p { color: #6B7280; font-size: 15px; margin-bottom: 28px; line-height: 1.5; }
    canvas { border-radius: 12px; }
    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      margin-top: 24px;
      padding: 12px 16px;
      background: #F0FDF4;
      border-radius: 10px;
    }
    .num {
      background: #16A34A;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .step-text { font-size: 14px; color: #374151; }
    .url { font-size: 11px; color: #9CA3AF; margin-top: 16px; word-break: break-all; }
    .status { margin-top: 16px; font-size: 13px; padding: 8px 16px; border-radius: 8px; }
    .waiting { background: #FEF3C7; color: #92400E; }
    .ready { background: #D1FAE5; color: #065F46; }
  </style>
</head>
<body>
  <div class="card">
    <h1>FridAI</h1>
    <p>Scannez ce QR code avec l'app <strong>Expo Go</strong> sur votre iPhone</p>
    <canvas id="qr"></canvas>
    <div id="status" class="status waiting">⏳ Démarrage du serveur Expo en cours...</div>

    <div class="step">
      <div class="num">1</div>
      <div class="step-text">Installez <strong>Expo Go</strong> sur l'App Store</div>
    </div>
    <div class="step">
      <div class="num">2</div>
      <div class="step-text">Connectez votre iPhone au <strong>même WiFi</strong> que ce PC</div>
    </div>
    <div class="step">
      <div class="num">3</div>
      <div class="step-text">Scannez le QR code avec l'app Expo Go</div>
    </div>

    <div class="url" id="expoUrl"></div>
  </div>

  <script>
    const EXPO_URL = "exp://192.168.8.104:8081";

    document.getElementById("expoUrl").textContent = EXPO_URL;

    QRCode.toCanvas(document.getElementById("qr"), EXPO_URL, {
      width: 240,
      margin: 2,
      color: { dark: "#111827", light: "#FFFFFF" }
    });

    // Check if expo server is reachable
    const checkServer = async () => {
      try {
        const res = await fetch("http://192.168.8.104:8081/status", { mode: "no-cors" });
        document.getElementById("status").className = "status ready";
        document.getElementById("status").textContent = "✅ Serveur prêt — scannez le QR code !";
        clearInterval(interval);
      } catch {
        // still waiting
      }
    };

    const interval = setInterval(checkServer, 2000);
    checkServer();
  </script>
</body>
</html>
